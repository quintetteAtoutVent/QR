<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quintette Atout Vent — Concert</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background: #12151a;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 36px 16px 48px;
        }
        .inner { width: 100%; max-width: 400px; text-align: center; }
        .logo {
            width: 88px; height: 88px; border-radius: 50%;
            border: 1.5px solid #c5a059; padding: 4px;
            background: #1c1f26; margin-bottom: 18px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem; font-weight: 700;
            color: #f0e6cc; letter-spacing: 0.5px; margin-bottom: 4px;
        }
        .sub {
            font-size: 0.78rem; font-weight: 300; color: #8a7b5e;
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px;
        }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; padding: 15px 18px; margin-bottom: 10px;
            border-radius: 6px; font-size: 0.82rem; letter-spacing: 1.5px;
            text-transform: uppercase; font-weight: 500; cursor: pointer;
        }
        .btn-primary { background: #c5a059; color: #12151a; border: none; }
        .btn-primary:active { background: #b08c46; }
        .btn-secondary { background: transparent; color: #c5a059; border: 1px solid rgba(197,160,89,0.35); }
        .btn-secondary:active { background: rgba(197,160,89,0.08); }
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 18px 0; }
        .footer { margin-top: 32px; font-size: 0.72rem; color: #4a4030; letter-spacing: 1px; text-transform: uppercase; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="inner">
        <img src="logo atout vent (1).svg" alt="Logo" class="logo">
        <h1>Quintette Atout Vent</h1>
        <p class="sub">Musique de chambre · Le Havre</p>

        <a href="Programme abbaye.png" class="btn btn-primary" target="_blank">
            📖 Programme du concert
        </a>

        <hr>

        <a href="https://www.instagram.com/atout_vent_quintette/" class="btn btn-secondary" target="_blank">📸 Instagram</a>
        <a href="https://www.facebook.com/QuintetteAtoutVent" class="btn btn-secondary" target="_blank">👤 Facebook</a>
        <a href="https://quintetteatoutvent.github.io/" class="btn btn-secondary" target="_blank">🌐 Site officiel</a>
        <a href="https://quintetteatoutvent.github.io/#contact" class="btn btn-secondary" target="_blank">✉️ Nous contacter</a>

        <div class="footer">© 2025 Quintette Atout Vent<br>Scannez pour nous suivre</div>
    </div>
</body>
</html>
